name: Upstream Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync upstream but keep local workflows
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 备份本仓库自己的 GitHub Actions 工作流，避免上游 workflow 覆盖后触发权限问题
          mkdir -p /tmp/keep-workflows
          if [ -d .github/workflows ]; then
            cp -a .github/workflows/. /tmp/keep-workflows/
          fi

          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream
          git checkout main
          git reset --hard upstream/main

          # 恢复本地工作流文件，保证同步时不改 .github/workflows/*
          mkdir -p .github/workflows
          rm -rf .github/workflows/*
          cp -a /tmp/keep-workflows/. .github/workflows/ || true

          git add -A
          if git diff --cached --quiet; then
            echo "✅ 与上游同步，无需更新"
            exit 0
          fi

          git commit -m "Sync upstream"
          git push origin main --force